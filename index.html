<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>推箱子 · Sokoban</title>
<style>
  /* ===== 全局基础样式：DOS 终端 ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  :root {
    --green: #33ff66;      /* 主磷光绿 */
    --green-dim: #1f9c3f;  /* 暗绿 */
    --green-bright: #b7ffce;/* 高亮绿 */
    --bg: #020a04;         /* 近黑底 */
    --font: "Consolas", "DejaVu Sans Mono", "Courier New", monospace;
  }
  body {
    font-family: var(--font);
    background: radial-gradient(120% 120% at 50% 40%, #04140a 0%, #020703 70%, #000 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100%;
    padding: 20px;
    color: var(--green);
    overflow: auto;
  }
  /* CRT 扫描线 + 轻微闪烁覆盖层（覆盖全屏，不拦截点击） */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    background:
      repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0) 0px,
        rgba(0,0,0,0) 2px,
        rgba(0,0,0,0.28) 3px,
        rgba(0,0,0,0.28) 4px
      );
    mix-blend-mode: multiply;
    animation: flicker 3.2s infinite steps(60);
  }
  /* 屏幕暗角，增强曲面显像管感 */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 99;
    background: radial-gradient(120% 120% at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%);
  }
  @keyframes flicker {
    0%,100% { opacity: 0.92; }
    48% { opacity: 0.88; }
    50% { opacity: 1; }
    52% { opacity: 0.9; }
  }

  /* ===== 终端窗口面板 ===== */
  .panel {
    position: relative;
    background: rgba(2,14,6,0.92);
    border: 2px solid var(--green-dim);
    border-radius: 6px;
    box-shadow:
      0 0 0 1px rgba(51,255,102,0.15),
      0 0 24px rgba(51,255,102,0.22),
      inset 0 0 60px rgba(51,255,102,0.06);
    padding: 18px 20px 16px;
    width: min(92vw, 640px);
    display: flex;
    flex-direction: column;
    gap: 14px;
    text-shadow: 0 0 4px rgba(51,255,102,0.6);
  }

  /* ===== 顶部标题栏 ===== */
  .titlebar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--green-dim);
    padding-bottom: 10px;
  }
  .title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--green-bright);
    text-shadow: 0 0 8px rgba(51,255,102,0.8);
  }
  .subtitle { font-size: 12px; color: var(--green-dim); letter-spacing: 1px; }

  /* ===== 数据统计栏 ===== */
  .stats {
    display: flex;
    gap: 10px;
  }
  .stat {
    background: rgba(51,255,102,0.05);
    border: 1px solid var(--green-dim);
    border-radius: 4px;
    padding: 6px 14px;
    text-align: center;
    min-width: 82px;
  }
  .stat .label { font-size: 11px; color: var(--green-dim); letter-spacing: 1px; }
  .stat .value {
    font-size: 22px; font-weight: 700; line-height: 1.1;
    color: var(--green-bright);
    text-shadow: 0 0 8px rgba(51,255,102,0.8);
  }

  /* ===== 游戏画布区 ===== */
  .stage {
    position: relative;
    background: #000;
    border: 1px solid var(--green-dim);
    border-radius: 4px;
    padding: 10px;
    box-shadow: inset 0 0 40px rgba(51,255,102,0.10);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    display: block;
    max-width: 100%;
    height: auto;
  }

  /* ===== 底部操作栏 ===== */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  /* 终端风格按钮：方框 + 反色悬浮 */
  .btn {
    cursor: pointer;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--green);
    padding: 8px 18px;
    border: 1px solid var(--green-dim);
    border-radius: 3px;
    background: rgba(51,255,102,0.06);
    text-shadow: 0 0 4px rgba(51,255,102,0.6);
    transition: background .12s ease, color .12s ease, box-shadow .12s ease;
  }
  .btn:hover {
    background: var(--green);
    color: #041006;
    text-shadow: none;
    box-shadow: 0 0 16px rgba(51,255,102,0.7);
  }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn.secondary { border-color: var(--green-dim); }
  .btn.ghost { border-color: var(--green-dim); }

  .hint {
    text-align: center;
    font-size: 12.5px;
    color: var(--green-dim);
    letter-spacing: 0.5px;
  }
  .hint b { color: var(--green-bright); font-weight: 700; }

  /* ===== 通关弹窗 ===== */
  .overlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.7);
    z-index: 50;
  }
  .overlay.show { display: flex; animation: fadeIn .25s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: rgba(2,14,6,0.97);
    border: 2px solid var(--green);
    border-radius: 6px;
    padding: 26px 32px;
    text-align: center;
    color: var(--green);
    box-shadow: 0 0 30px rgba(51,255,102,0.5), inset 0 0 40px rgba(51,255,102,0.08);
    max-width: 82vw;
    text-shadow: 0 0 4px rgba(51,255,102,0.6);
    animation: pop .28s ease;
  }
  @keyframes pop { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal .emoji { font-size: 20px; letter-spacing: 2px; color: var(--green-bright); white-space: pre; }
  .modal h2 {
    margin: 10px 0 6px;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--green-bright);
    text-shadow: 0 0 8px rgba(51,255,102,0.8);
  }
  .modal p { color: var(--green-dim); font-size: 14px; margin-bottom: 18px; }

  @media (max-width: 480px) {
    .title { font-size: 16px; }
    .stat { min-width: 64px; padding: 5px 10px; }
    .btn { padding: 7px 14px; font-size: 13px; }
  }
</style>
</head>
<body>
  <div class="panel">
    <!-- 顶部标题栏 -->
    <div class="titlebar">
      <div>
        <div class="title">C:\&gt; SOKOBAN.EXE</div>
        <div class="subtitle">DOS TERMINAL EDITION · v1.0</div>
      </div>
      <div class="stats">
        <div class="stat"><div class="label">LEVEL</div><div class="value" id="levelNo">1</div></div>
        <div class="stat"><div class="label">MOVES</div><div class="value" id="moveCount">0</div></div>
      </div>
    </div>

    <!-- 游戏画布 -->
    <div class="stage">
      <canvas id="game"></canvas>
    </div>

    <!-- 底部操作按钮 -->
    <div class="controls">
      <button class="btn ghost" id="prevBtn">[ &lt; PREV ]</button>
      <button class="btn secondary" id="resetBtn">[ RESET ]</button>
      <button class="btn" id="nextBtn">[ NEXT &gt; ]</button>
    </div>

    <!-- 操作提示 -->
    <div class="hint">
      <b>ARROWS</b> / <b>W A S D</b> 移动光标 <b>&#9786;</b> · 把所有 <b>$</b> 推到 <b>.</b> 终点即可通关
    </div>
  </div>

  <!-- 通关弹窗 -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="emoji" id="modalEmoji">*** LEVEL CLEAR ***</div>
      <h2 id="modalTitle">恭喜过关！</h2>
      <p id="modalText">正在进入下一关…</p>
      <button class="btn" id="modalBtn">[ CONTINUE ]</button>
    </div>
  </div>

<script>
/* =========================================================
   关卡数据（独立存放，方便后续自行增改关卡）
   图例符号：
     #  墙壁      （空格）地板
     .  终点      $  箱子
     *  箱子已在终点上   @  玩家
     +  玩家站在终点上
   每关是一个字符串数组，每个字符串是一行，长度需一致。
   ========================================================= */
const LEVELS = [
  // ================= 第 1-3 关：入门单箱子，直线布局 =================
  [ // 1 —— 向右推一格
    "#######",
    "#     #",
    "#@$  .#",
    "#     #",
    "#######"
  ],
  [ // 2 —— 向上推两格
    "#######",
    "#   . #",
    "#     #",
    "#   $ #",
    "#   @ #",
    "#######"
  ],
  [ // 3 —— 向下推两格
    "#######",
    "# @   #",
    "# $   #",
    "#     #",
    "# .   #",
    "#######"
  ],
  // ================= 第 4-6 关：2 个箱子，小型迂回迷宫 =================
  [ // 4 —— 两箱分别向上，需绕到箱后
    "########",
    "#      #",
    "#  ..  #",
    "#  $$  #",
    "#  @   #",
    "#      #",
    "########"
  ],
  [ // 5 —— 两箱向左右分开推
    "#########",
    "#       #",
    "#.$ @ $.#",
    "#       #",
    "#########"
  ],
  [ // 6 —— 中间竖墙分隔，需从底部绕路
    "#########",
    "#   #   #",
    "# . # . #",
    "# $ # $ #",
    "#   #   #",
    "#@      #",
    "#########"
  ],
  // ================= 第 7-8 关：3 个箱子，多层迂回 =================
  [ // 7 —— 三箱向上，中央障碍需绕行
    "##########",
    "# .  .  .#",
    "# $  $  $#",
    "#        #",
    "#  ####  #",
    "#   @    #",
    "##########"
  ],
  [ // 8 —— 三箱向右推，需反复绕到箱后
    "#########",
    "#       #",
    "# $   . #",
    "# $   . #",
    "# $   . #",
    "#  @    #",
    "#########"
  ],
  // ================= 第 9-10 关：4 个箱子，高难度迂回 =================
  [ // 9 —— 四箱两上两下，讲究顺序
    "##########",
    "#   ..   #",
    "#   $$   #",
    "#        #",
    "#   $$   #",
    "#   ..   #",
    "#  @     #",
    "##########"
  ],
  [ // 10 —— 中央墙块，四箱需绕大圈就位
    "############",
    "#          #",
    "#  .    .  #",
    "#  $    $  #",
    "#   ####   #",
    "#  $    $  #",
    "#  .    .  #",
    "#    @     #",
    "############"
  ]
];

/* =========================================================
   基础配置与全局状态
   ========================================================= */
const TILE = 44;                 // 每个格子的逻辑像素尺寸（字符单元）
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let current = 0;                 // 当前关卡索引
let moves = 0;                   // 当前关卡移动步数
let walls = [];                  // 墙壁二维布尔数组 walls[r][c]
let targets = [];                // 终点坐标数组 {r,c}
let boxes = [];                  // 箱子数组 {r,c, x,y}  r/c为格子逻辑坐标，x/y为动画像素坐标
let player = null;               // 玩家 {r,c, x,y, squash, dir}
let rows = 0, cols = 0;          // 地图行列数
let animating = false;           // 是否正在播放移动动画（动画期间锁定输入）
let solved = false;              // 当前关是否已通关（防止重复弹窗）

/* 将逻辑格子坐标转换为像素坐标（格子左上角） */
function cellToPx(n) { return n * TILE; }

/* =========================================================
   关卡解析：把字符串数组转成内部数据结构
   ========================================================= */
function loadLevel(index) {
  const map = LEVELS[index];
  rows = map.length;
  cols = Math.max(...map.map(r => r.length));

  walls = [];
  targets = [];
  boxes = [];
  player = null;
  moves = 0;
  solved = false;

  for (let r = 0; r < rows; r++) {
    walls[r] = [];
    for (let c = 0; c < cols; c++) {
      const ch = map[r][c] || ' ';
      walls[r][c] = (ch === '#');
      // 终点：. * +
      if (ch === '.' || ch === '*' || ch === '+') targets.push({ r, c });
      // 箱子：$ *
      if (ch === '$' || ch === '*') boxes.push({ r, c, x: cellToPx(c), y: cellToPx(r) });
      // 玩家：@ +
      if (ch === '@' || ch === '+') player = {
        r, c, x: cellToPx(c), y: cellToPx(r),
        squash: 0, dir: 0, moving: 0, bounce: 0,
        face: { dr: 0, dc: 0 }, bounceDir: { dr: 0, dc: 0 }
      };
    }
  }

  // 设置画布尺寸（考虑高清屏 devicePixelRatio）
  const dpr = window.devicePixelRatio || 1;
  canvas.width = cols * TILE * dpr;
  canvas.height = rows * TILE * dpr;
  canvas.style.width = (cols * TILE) + 'px';
  canvas.style.height = (rows * TILE) + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  document.getElementById('levelNo').textContent = index + 1;
  document.getElementById('moveCount').textContent = moves;
  updateNavButtons();
}

/* 更新上一关/下一关按钮的可用状态 */
function updateNavButtons() {
  document.getElementById('prevBtn').disabled = (current === 0);
  document.getElementById('prevBtn').style.opacity = (current === 0) ? 0.45 : 1;
}

/* 查询某格是否是墙 */
function isWall(r, c) {
  if (r < 0 || c < 0 || r >= rows || c >= cols) return true; // 越界当作墙
  return walls[r][c];
}
/* 查询某格是否有箱子，返回箱子对象或 null */
function boxAt(r, c) {
  return boxes.find(b => b.r === r && b.c === c) || null;
}
/* 查询某格是否是终点 */
function isTarget(r, c) {
  return targets.some(t => t.r === r && t.c === c);
}

/* =========================================================
   移动逻辑：dr/dc 为方向增量（一次一格）
   ========================================================= */
function tryMove(dr, dc) {
  if (animating || solved) return;
  player.dir = (dc < 0) ? -1 : (dc > 0 ? 1 : player.dir); // 记录朝向（用于小人面向）
  player.face = { dr, dc };                    // 记录移动方向（用于形变方向）

  const nr = player.r + dr, nc = player.c + dc;
  if (isWall(nr, nc)) { bounce(dr, dc); return; }        // 前方是墙：轻微回弹

  const box = boxAt(nr, nc);
  if (box) {
    // 前方是箱子：检查箱子前方
    const br = nr + dr, bc = nc + dc;
    if (isWall(br, bc) || boxAt(br, bc)) { bounce(dr, dc); return; } // 推不动：回弹
    // 推动箱子
    box.r = br; box.c = bc;
    player.squash = 1.15;                        // 推箱：更强的挤压反馈
  } else {
    player.squash = 0.6;                         // 普通移动：轻度缩放缓冲
  }

  // 移动玩家
  player.r = nr; player.c = nc;
  player.moving = 1;                             // 标记进入移动状态
  moves++;
  document.getElementById('moveCount').textContent = moves;
  animating = true;                             // 开始动画，锁定输入直到缓动结束
}

/* 撞墙回弹：朝目标方向微微顶出再弹回 */
function bounce(dr, dc) {
  if (player.bounce > 0.01) return;              // 回弹中不重复触发
  player.bounce = 1;
  player.bounceDir = { dr, dc };
  animating = true;
}

/* =========================================================
   绘图辅助 —— DOS 终端字符渲染
   全部以等宽绿字绘制在黑底之上，配合磷光辉光。
   ========================================================= */
const FG = '#33ff66';        // 主磷光绿
const FG_DIM = '#1f9c3f';    // 暗绿
const FG_BRIGHT = '#c8ffd8'; // 高亮绿
const GLYPH_FONT = 'bold ' + Math.round(TILE * 0.72) + 'px "Consolas","DejaVu Sans Mono","Courier New",monospace';

/* 在格子中心绘制一个字符。
   opts: { color, glow(辉光半径), alpha, scale } */
function drawGlyph(ch, px, py, opts = {}) {
  const color = opts.color || FG;
  const glow = opts.glow != null ? opts.glow : 8;
  const alpha = opts.alpha != null ? opts.alpha : 1;
  const scale = opts.scale != null ? opts.scale : 1;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = GLYPH_FONT;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.translate(px + TILE / 2, py + TILE / 2);
  if (scale !== 1) ctx.scale(scale, scale);
  if (glow > 0) {
    ctx.shadowColor = color;
    ctx.shadowBlur = glow;
  }
  ctx.fillStyle = color;
  // 叠加两次以强化辉光实心感
  ctx.fillText(ch, 0, 1);
  ctx.fillText(ch, 0, 1);
  ctx.restore();
}

/* 地板：暗绿点阵背景（间隔显示 '·'，营造字符网格） */
function drawFloor(r, c) {
  const x = cellToPx(c), y = cellToPx(r);
  if (!isTarget(r, c)) {
    drawGlyph('.', x, y, { color: 'rgba(31,156,63,0.35)', glow: 0 });
  }
}

/* 墙：'#' 字符 */
function drawWall(r, c) {
  drawGlyph('#', cellToPx(c), cellToPx(r), { color: FG_DIM, glow: 6 });
}

/* 终点：'.' / 已到位显示为亮 '*'，呼吸闪烁 */
function drawTarget(r, c, t) {
  const x = cellToPx(c), y = cellToPx(r);
  const done = !!boxAt(r, c);
  const pulse = 0.5 + 0.5 * Math.sin(t / 400);
  if (done) return; // 已到位由 drawBox 以 '*' 呈现
  drawGlyph('.', x, y, {
    color: FG_BRIGHT,
    glow: 6 + pulse * 10,
    alpha: 0.55 + pulse * 0.45,
    scale: 1.4
  });
}

/* 箱子：未到位 '$'，到位 '*'（更亮 + 强辉光） */
function drawBox(b) {
  const onTarget = isTarget(b.r, b.c);
  drawGlyph(onTarget ? '*' : '$', b.x, b.y, {
    color: onTarget ? FG_BRIGHT : FG,
    glow: onTarget ? 16 : 8
  });
}

/* 玩家：'@' 字符，撞墙回弹位移 + 移动/推箱时轻微缩放脉冲 */
function drawPlayer(t) {
  const bAmt = Math.sin(player.bounce * Math.PI) * 6;
  const bx = player.bounceDir.dc * bAmt;
  const by = player.bounceDir.dr * bAmt;
  // 移动/推箱挤压转为字符缩放脉冲；站立时字符轻微呼吸
  const idle = (1 - player.moving);
  const breathe = Math.sin(t / 380) * 0.04 * idle;
  const scale = 1 + player.squash * 0.18 + breathe;
  drawGlyph('@', player.x + bx, player.y + by, {
    color: FG_BRIGHT,
    glow: 14,
    scale
  });
}

/* =========================================================
   动画与主循环
   ========================================================= */
function updateAnimation() {
  const speed = 0.28;        // 缓动系数（越大越快）
  let moving = false;

  // 玩家平滑缓动到目标格
  const ptx = cellToPx(player.c), pty = cellToPx(player.r);
  player.x += (ptx - player.x) * speed;
  player.y += (pty - player.y) * speed;
  if (Math.abs(ptx - player.x) > 0.5 || Math.abs(pty - player.y) > 0.5) moving = true;
  else { player.x = ptx; player.y = pty; }

  // 挤压反馈衰减
  if (player.squash > 0.01) { player.squash *= 0.80; moving = true; }
  else player.squash = 0;

  // 移动状态标记衰减（用于区分站立/移动）
  if (player.moving > 0.01) { player.moving *= 0.82; if (!moving) player.moving = 0; }
  else player.moving = 0;

  // 撞墙回弹衰减（正弦式顶出再弹回）
  if (player.bounce > 0.01) { player.bounce *= 0.72; moving = true; }
  else player.bounce = 0;

  // 箱子平滑缓动
  boxes.forEach(b => {
    const btx = cellToPx(b.c), bty = cellToPx(b.r);
    b.x += (btx - b.x) * speed;
    b.y += (bty - b.y) * speed;
    if (Math.abs(btx - b.x) > 0.5 || Math.abs(bty - b.y) > 0.5) moving = true;
    else { b.x = btx; b.y = bty; }
  });

  if (!moving && animating) {
    animating = false;
    checkWin();            // 动画结束后判定通关
  }
}

/* 通关判定：所有箱子都在终点上 */
function checkWin() {
  const win = boxes.every(b => isTarget(b.r, b.c));
  if (win && !solved) {
    solved = true;
    showWin();
  }
}

/* 主渲染循环 */
function loop(t) {
  updateAnimation();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // 依次绘制：地板 → 终点 → 墙 → 箱子 → 玩家
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (!isWall(r, c)) drawFloor(r, c);
  targets.forEach(tg => drawTarget(tg.r, tg.c, t));
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (isWall(r, c)) drawWall(r, c);
  boxes.forEach(drawBox);
  drawPlayer(t);
  requestAnimationFrame(loop);
}

/* =========================================================
   通关弹窗与关卡切换
   ========================================================= */
const overlay = document.getElementById('overlay');
function showWin() {
  const last = (current === LEVELS.length - 1);
  document.getElementById('modalEmoji').textContent = last ? '🏆' : '🎉';
  document.getElementById('modalTitle').textContent = last ? '全部通关！' : '恭喜过关！';
  document.getElementById('modalText').textContent = last
    ? `你用 ${moves} 步完成了全部 ${LEVELS.length} 关，太厉害了！`
    : `本关用了 ${moves} 步，点击进入下一关。`;
  document.getElementById('modalBtn').textContent = last ? '再玩一次' : '下一关 ▶';
  overlay.classList.add('show');
}
function hideWin() { overlay.classList.remove('show'); }

/* 弹窗按钮：自动跳转下一关（若已是最后一关则回到第一关） */
document.getElementById('modalBtn').addEventListener('click', () => {
  hideWin();
  if (current === LEVELS.length - 1) current = 0;
  else current++;
  loadLevel(current);
});

/* 底部按钮 */
document.getElementById('prevBtn').addEventListener('click', () => {
  if (current > 0) { current--; loadLevel(current); }
});
document.getElementById('nextBtn').addEventListener('click', () => {
  hideWin();
  if (current < LEVELS.length - 1) { current++; loadLevel(current); }
  else {
    // 无下一关：提示全部通关
    document.getElementById('modalEmoji').textContent = '🏁';
    document.getElementById('modalTitle').textContent = '已是最后一关';
    document.getElementById('modalText').textContent = '这已经是最后一关啦，加油通关！';
    document.getElementById('modalBtn').textContent = '知道了';
    overlay.classList.add('show');
  }
});
document.getElementById('resetBtn').addEventListener('click', () => {
  hideWin();
  loadLevel(current);      // 重置当前关，步数自动清零
});

/* =========================================================
   键盘控制：方向键 + WASD
   ========================================================= */
window.addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())) e.preventDefault();
  if (k === 'arrowup' || k === 'w') tryMove(-1, 0);
  else if (k === 'arrowdown' || k === 's') tryMove(1, 0);
  else if (k === 'arrowleft' || k === 'a') tryMove(0, -1);
  else if (k === 'arrowright' || k === 'd') tryMove(0, 1);
  else if (k === 'r') loadLevel(current);      // R 键快速重置
});

/* 启动游戏 */
loadLevel(0);
requestAnimationFrame(loop);
</script>
